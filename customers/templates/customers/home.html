<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ tenant_name }}</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f7fa;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 90%;
        }

        h1 {
            margin-top: 0;
            color: #333;
        }

        p {
            color: #666;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background: #4a90e2;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-weight: 500;
            transition: background 0.2s;
        }

        .btn:hover {
            background: #357abd;
        }

        .status-badge {
            display: inline-block;
            margin-top: 10px;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.85rem;
            background: #e9ecef;
            color: #495057;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>{{ tenant_name }}</h1>
        <p>Welcome to the digital workspace for <strong>{{ tenant_name }}</strong>.</p>

        <div class="status-badge">System Status: {{ tenant.get_status_display }}</div>
        <br>

        <a href="{% url 'login' %}" class="btn">Login to Workspace</a>
    </div>
</body>

</html>
