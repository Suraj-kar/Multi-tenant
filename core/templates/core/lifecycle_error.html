<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f7fa;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }

        .container {
            background: white;
            padding: 50px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            text-align: center;
        }

        .icon {
            font-size: 64px;
            margin-bottom: 20px;
            display: block;
        }

        h1 {
            margin: 0 0 10px;
            font-size: 24px;
            color: #2c3e50;
        }

        p {
            color: #7f8c8d;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .btn {
            display: inline-block;
            padding: 12px 24px;
            background: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-weight: 500;
            transition: background 0.2s;
        }

        .btn:hover {
            background: #2980b9;
        }

        /* State specific styles */
        .suspended .icon {
            color: #f39c12;
        }

        .terminated .icon {
            color: #c0392b;
        }

        .onboarding .icon {
            color: #3498db;
        }
    </style>
</head>

<body class="{{ state_class }}">
    <div class="container">
        <div class="icon">{{ icon }}</div>
        <h1>{{ heading }}</h1>
        <p>{{ message }}</p>
        {% if action_url %}
        <a href="{{ action_url }}" class="btn">{{ action_text }}</a>
        {% endif %}
    </div>
</body>

</html>
